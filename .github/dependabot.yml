version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      pip-minor-and-patch:
        update-types: [minor, patch]
