name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
  workflow_dispatch:

# Serialize releases; do not cancel in-progress to protect partial uploads.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build wheels ──────────────────────────────────────────────────────────────
  build-wheels:
    name: Wheel (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: macos-14
            target: x86_64-apple-darwin
            manylinux: ""
          - runner: macos-14
            target: aarch64-apple-darwin
            manylinux: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # TODO: pin PyO3/maturin-action to a commit SHA once the first release confirms
      # the exact SHA in use. See docs/dev/ci-porting-notes.md.
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # Pass manylinux only for Linux targets; empty string disables it for macOS/Windows.
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --locked --out dist
          sccache: "true"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.platform.target }}
          path: dist/*.whl
          retention-days: 1

  # ── Build sdist ───────────────────────────────────────────────────────────────
  build-sdist:
    name: sdist
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: PyO3/maturin-action@v1 # TODO: pin to SHA
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-sdist
          path: dist/*.tar.gz
          retention-days: 1

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write      # gh release create
      id-token: write      # OIDC for attestation
      attestations: write  # actions/attest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: sha256sum dist/* > dist/SHA256SUMS
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./dist
          artifact-name: chokkin-sbom.spdx.json
          # Write into dist/ so it is included in the gh release create glob below.
          output-file: ./dist/chokkin-sbom.spdx.json
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            dist/*

  # ── Publish to PyPI (tags only) ───────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [release]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/p/chokkin
    permissions:
      id-token: write  # PyPI Trusted Publishing (no token needed)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      # TODO: pin pypa/gh-action-pypi-publish to a commit SHA.
      # PyPI Trusted Publishing requires the environment named "pypi" to be
      # registered in pypi.org settings: repo=watany-dev/chokkin, workflow=release.yml.
      # See docs/dev/ci-porting-notes.md for setup instructions.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
