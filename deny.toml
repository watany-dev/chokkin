[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
ignore = [
    # Transitive via rustpython-parser 0.4 (ADR 0001). Revisit when evaluating Ruff parser.
    { id = "RUSTSEC-2025-0075", reason = "rustpython-parser → unic-char-range" },
    { id = "RUSTSEC-2025-0080", reason = "rustpython-parser → unic-common" },
    { id = "RUSTSEC-2025-0081", reason = "rustpython-parser → unic-char-property" },
    { id = "RUSTSEC-2025-0090", reason = "rustpython-parser → unic-emoji-char" },
    { id = "RUSTSEC-2025-0098", reason = "rustpython-parser → unic-ucd-version" },
    { id = "RUSTSEC-2025-0100", reason = "rustpython-parser → unic-ucd-ident" },
]
yanked = "deny"
unmaintained = "workspace"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Artistic-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
